<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Stretches">
<meta name="theme-color" content="#f5f4f0">
<title>Stretches</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    padding: 0;
  }

  .app-header {
    background: #fff;
    border-bottom: 0.5px solid #d3d1c7;
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .app-title {
    font-size: 18px;
    font-weight: 500;
    color: #1a1a18;
  }

  .app-subtitle {
    font-size: 12px;
    color: #888780;
    margin-top: 2px;
  }

  .content { padding: 16px; }

  .moment-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }

  .moment-btn {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    padding: 12px 10px;
    cursor: pointer;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 3px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
    width: 100%;
  }

  .moment-btn:active { background: #f1efe8; }

  .moment-btn.active {
    border: 2px solid #534AB7;
    background: #EEEDFE;
  }

  .m-icon { font-size: 22px; margin-bottom: 2px; }
  .m-label { font-size: 13px; font-weight: 500; color: #1a1a18; line-height: 1.3; }
  .moment-btn.active .m-label { color: #26215C; }
  .m-meta { font-size: 11px; color: #888780; }
  .moment-btn.active .m-meta { color: #534AB7; }

  .routine-card {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    overflow: hidden;
  }

  .routine-header {
    padding: 14px 14px 12px;
    border-bottom: 0.5px solid #d3d1c7;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .r-icon { font-size: 24px; flex-shrink: 0; }

  .r-title {
    font-size: 16px;
    font-weight: 500;
    color: #1a1a18;
    line-height: 1.3;
  }

  .r-meta { font-size: 12px; color: #b4b2a9; margin-top: 2px; }

  .progress-wrap { padding: 10px 14px 4px; }

  .progress-track {
    height: 4px;
    background: #e8e7e3;
    border-radius: 2px;
  }

  .progress-fill {
    height: 4px;
    background: #0F6E56;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-size: 11px;
    color: #888780;
    margin-top: 5px;
  }

  .stretch-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 0.5px solid #eeedeb;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }

  .stretch-item:last-of-type { border-bottom: none; }
  .stretch-item:active { background: #f9f8f5; }
  .stretch-item.done { opacity: 0.4; }

  .check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid #d3d1c7;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    transition: all 0.15s;
  }

  .stretch-item.done .check {
    background: #0F6E56;
    border-color: #0F6E56;
  }

  .check svg { display: none; }
  .stretch-item.done .check svg { display: block; }

  .s-body { flex: 1; min-width: 0; }

  .s-name {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a18;
    line-height: 1.3;
  }

  .stretch-item.done .s-name {
    text-decoration: line-through;
    color: #b4b2a9;
  }

  .s-cue {
    font-size: 12px;
    color: #5f5e5a;
    margin-top: 3px;
    line-height: 1.4;
  }

  .s-time {
    font-size: 11px;
    color: #888780;
    white-space: nowrap;
    flex-shrink: 0;
    padding-top: 3px;
  }

  .routine-note {
    padding: 10px 14px;
    font-size: 12px;
    font-style: italic;
    color: #5f5e5a;
    background: #f9f8f5;
    border-top: 0.5px solid #d3d1c7;
    line-height: 1.5;
  }

  .done-banner {
    display: none;
    padding: 14px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: #085041;
    background: #E1F5EE;
    border-top: 0.5px solid #9FE1CB;
  }

  .reset-btn {
    width: calc(100% - 28px);
    margin: 12px 14px;
    padding: 10px;
    border-radius: 8px;
    border: 0.5px solid #d3d1c7;
    background: transparent;
    color: #888780;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  .reset-btn:active { background: #f1efe8; }

  .tip-bar {
    margin-top: 12px;
    padding: 10px 14px;
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    font-size: 12px;
    color: #5f5e5a;
    line-height: 1.5;
  }

  .tip-bar strong { font-weight: 500; color: #1a1a18; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f0eeea; }
    .app-header { background: #2c2c2a; border-color: #444441; }
    .app-title { color: #f0eeea; }
    .moment-btn { background: #2c2c2a; border-color: #444441; }
    .moment-btn:active { background: #3a3a38; }
    .moment-btn.active { background: #26215C; border-color: #534AB7; }
    .moment-btn.active .m-label { color: #CECBF6; }
    .moment-btn.active .m-meta { color: #AFA9EC; }
    .m-label { color: #f0eeea; }
    .routine-card { background: #2c2c2a; border-color: #444441; }
    .routine-header { border-color: #444441; }
    .r-title { color: #f0eeea; }
    .progress-track { background: #444441; }
    .stretch-item { border-color: #3a3a38; }
    .stretch-item:active { background: #3a3a38; }
    .check { background: #2c2c2a; border-color: #5f5e5a; }
    .s-name { color: #f0eeea; }
    .s-cue { color: #b4b2a9; }
    .routine-note { background: #242422; border-color: #444441; color: #b4b2a9; }
    .reset-btn { border-color: #444441; color: #888780; }
    .reset-btn:active { background: #3a3a38; }
    .tip-bar { background: #2c2c2a; border-color: #444441; color: #b4b2a9; }
    .tip-bar strong { color: #f0eeea; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Stretches</div>
  <div class="app-subtitle">Tap your moment, tick off as you go</div>
</div>

<div class="content">
  <div class="moment-grid" id="momentGrid"></div>
  <div class="routine-card" id="routineCard"></div>
  <div class="tip-bar" id="tipBar"></div>
</div>

<script>
var MOMENTS = [
  {
    id: 'morning',
    icon: '☀️',
    label: 'Morning',
    meta: 'Before commute',
    title: 'Morning routine',
    duration: '~5 mins',
    note: 'Wait 20–30 mins after waking before hanging — discs rehydrate overnight. Move around first.',
    tip: 'Hip flexors are the priority today. Cycling shortens them and sitting locks that in.',
    stretches: [
      { name: 'Hip flexor stretch', cue: 'Lunge, tuck pelvis under. Deep pull at front of hip and lower abdomen.', time: '30–45s each side' },
      { name: 'Deadman hang', cue: 'Arms fully extended, shoulders passively up. Slow exhales. Feet on floor is fine.', time: '4–5 × 20–30s' },
      { name: 'Chest opener', cue: 'Clasp hands behind back, squeeze shoulder blades together and lift slightly.', time: '20–30s × 2' }
    ]
  },
  {
    id: 'postcycle',
    icon: '🚲',
    label: 'Post-cycle',
    meta: 'Before sitting down',
    title: 'Post-commute',
    duration: '~3 mins',
    note: 'Muscles are warm — this is the highest value stretching window of the whole day.',
    tip: 'Do this before you sit down. Going straight to your desk locks in the hip compression from the ride.',
    stretches: [
      { name: 'Hip flexor stretch', cue: '35 mins on the bike = 35 mins of shortening. Don\'t let it lock in.', time: '45s each side' },
      { name: 'Figure-four', cue: 'Cross ankle over opposite knee, sit tall, lean forward. Glutes and outer hip.', time: '30s each side' },
      { name: 'Calf stretch', cue: 'Hands on wall, one foot back, heel flat to the ground.', time: '20s each side' }
    ]
  },
  {
    id: 'desk',
    icon: '💻',
    label: 'At the desk',
    meta: 'Every 60–90 mins',
    title: 'Desk reset',
    duration: 'Every 60–90 mins',
    note: 'Set a phone reminder. Never sit for more than 90 minutes unbroken.',
    tip: 'The seated figure-four is the most useful one here — it undoes what sitting does to your hips.',
    stretches: [
      { name: 'Seated figure-four', cue: 'Cross ankle over knee, sit tall, lean slightly forward.', time: '30s each side' },
      { name: 'Neck rolls', cue: 'Drop one ear to shoulder, hold, slowly roll to the other side.', time: '20s each side' },
      { name: 'Seated spinal twist', cue: 'Sit upright, rotate torso, rest hand on back of chair.', time: '20–30s each side' },
      { name: 'Chest opener', cue: 'Clasp hands behind back, squeeze shoulder blades. Undoes the hunch.', time: '20s × 2' },
      { name: 'Stand up and walk', cue: 'Even 2 minutes breaks the compression cycle. Water, bathroom — anything.', time: '2 mins' }
    ]
  },
  {
    id: 'preeve',
    icon: '🏢',
    label: 'Pre-eve cycle',
    meta: 'Before leaving office',
    title: 'Before evening commute',
    duration: '~3 mins',
    note: 'Hips are tight from a day of sitting. Open them before loading on the bike.',
    tip: 'Leg swings are dynamic — they warm the hip up rather than just stretching it. Good before riding.',
    stretches: [
      { name: 'Hip flexor stretch', cue: 'You\'ve been sitting for hours. Open them before loading on the bike.', time: '30–45s each side' },
      { name: 'Thoracic rotation', cue: 'Hands behind head, rotate torso each side. Opens mid-back after desk posture.', time: '5 reps each side' },
      { name: 'Leg swings', cue: 'Hold a wall, swing each leg front-to-back then side-to-side.', time: '10 each direction' }
    ]
  },
  {
    id: 'prestrength',
    icon: '🏋️',
    label: 'Pre-strength',
    meta: 'Before lifting',
    title: 'Pre-strength warm-up',
    duration: '~5 mins',
    note: 'Warm up with movement — not static holds. Static stretching before lifting can temporarily reduce power output.',
    tip: 'These are movement preps, not stretches. Get warm and mobile before you load the bar.',
    stretches: [
      { name: 'Bodyweight squats', cue: 'Slow and controlled, full depth. Primes hips, knees and ankles.', time: '2 × 10' },
      { name: 'Arm circles', cue: 'Big slow circles forward and back. Warms the shoulder joint.', time: '10 each way' },
      { name: 'Hip circles', cue: 'Hands on hips, slow big rotations. Opens the hip before squatting.', time: '10 each way' }
    ]
  },
  {
    id: 'poststrength',
    icon: '💪',
    label: 'Post-strength',
    meta: 'After lifting',
    title: 'Post-strength cooldown',
    duration: '~5 mins',
    note: 'Muscles are warm and pliable — best time for longer holds. Don\'t skip this.',
    tip: 'Doorframe chest stretch is especially important after bench and rows — it reopens the chest you just compressed.',
    stretches: [
      { name: 'Hip flexor stretch', cue: 'Especially important after squats and deadlifts.', time: '45s each side' },
      { name: 'Doorframe chest stretch', cue: 'Arms at 90°, lean through a doorframe. After any pressing session.', time: '30s × 2' },
      { name: 'Standing quad stretch', cue: 'Hold foot behind you, stand tall. After lower body days.', time: '30s each side' }
    ]
  },
  {
    id: 'evening',
    icon: '🏠',
    label: 'Evening',
    meta: 'Home wind-down',
    title: 'Evening wind-down',
    duration: '~5–8 mins',
    note: 'Do this on the floor in front of the TV. It doesn\'t need to feel like exercise.',
    tip: 'This is the easiest one to skip and the one that compounds the most over time. Floor + TV is the trick.',
    stretches: [
      { name: 'Hip flexor stretch', cue: 'Third time on office days — still worth it every time.', time: '45s each side' },
      { name: 'Figure-four on the floor', cue: 'Lie on back, cross ankle over knee, pull both legs toward chest.', time: '45s each side' },
      { name: 'Child\'s pose', cue: 'Knees wide, arms extended, forehead down. Decompresses lower back.', time: '60s' },
      { name: 'Spinal twist (floor)', cue: 'On back, one knee across body, arms out wide. Gently rotates thoracic spine.', time: '45s each side' }
    ]
  }
];

var state = { active: 'morning', done: {} };
try {
  var saved = JSON.parse(localStorage.getItem('stretch-v1') || '{}');
  if (saved.done) state.done = saved.done;
  if (saved.active) state.active = saved.active;
} catch(e) {}

function save() {
  try { localStorage.setItem('stretch-v1', JSON.stringify({ done: state.done, active: state.active })); } catch(e) {}
}

function toggleDone(momentId, idx) {
  var key = momentId + '-' + idx;
  state.done[key] = !state.done[key];
  save();
  render();
}

function setActive(id) {
  state.active = id;
  save();
  render();
}

function resetMoment(momentId) {
  Object.keys(state.done).forEach(function(k) {
    if (k.indexOf(momentId + '-') === 0) delete state.done[k];
  });
  save();
  render();
}

function render() {
  var grid = document.getElementById('momentGrid');
  var card = document.getElementById('routineCard');
  var tipBar = document.getElementById('tipBar');
  var moment = MOMENTS.find(function(m) { return m.id === state.active; });

  grid.innerHTML = MOMENTS.map(function(m) {
    var doneCount = m.stretches.filter(function(_, i) { return state.done[m.id + '-' + i]; }).length;
    var total = m.stretches.length;
    var isActive = m.id === state.active;
    var metaText = doneCount > 0 ? doneCount + '/' + total + ' done' : m.meta;
    return '<button class="moment-btn' + (isActive ? ' active' : '') + '" onclick="setActive(\'' + m.id + '\')" aria-label="' + m.label + '">' +
      '<span class="m-icon">' + m.icon + '</span>' +
      '<span class="m-label">' + m.label + '</span>' +
      '<span class="m-meta">' + metaText + '</span>' +
    '</button>';
  }).join('');

  if (!moment) return;

  var doneCount = moment.stretches.filter(function(_, i) { return state.done[moment.id + '-' + i]; }).length;
  var total = moment.stretches.length;
  var pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
  var allDone = doneCount === total;

  var stretchHTML = moment.stretches.map(function(s, i) {
    var done = !!state.done[moment.id + '-' + i];
    return '<div class="stretch-item' + (done ? ' done' : '') + '" onclick="toggleDone(\'' + moment.id + '\',' + i + ')">' +
      '<div class="check">' +
        '<svg width="13" height="13" viewBox="0 0 13 13" fill="none">' +
          '<path d="M2 6.5L5.5 10L11 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
      '</div>' +
      '<div class="s-body">' +
        '<div class="s-name">' + s.name + '</div>' +
        '<div class="s-cue">' + s.cue + '</div>' +
      '</div>' +
      '<div class="s-time">' + s.time + '</div>' +
    '</div>';
  }).join('');

  card.innerHTML =
    '<div class="routine-header">' +
      '<span class="r-icon">' + moment.icon + '</span>' +
      '<div>' +
        '<div class="r-title">' + moment.title + '</div>' +
        '<div class="r-meta">' + moment.duration + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="progress-wrap">' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="progress-label">' + doneCount + ' of ' + total + ' done</div>' +
    '</div>' +
    stretchHTML +
    (moment.note ? '<div class="routine-note">' + moment.note + '</div>' : '') +
    (allDone ? '<div class="done-banner" style="display:block">All done ✓</div>' : '') +
    '<button class="reset-btn" onclick="resetMoment(\'' + moment.id + '\')">Reset ticks</button>';

  tipBar.innerHTML = '<strong>Tip:</strong> ' + moment.tip;
}

render();
</script>
</body>
</html>
